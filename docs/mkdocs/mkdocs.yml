site_name: Suitefish CMS
repo_url: https://github.com/bugfishtm/suitefish-cms
repo_name: suitefish-cms

nav:
    - Introduction: index.md
    - Screenshots: screenshots.md
    - Tutorials: tutorials.md
    - Download: download.md
    - Installation: installation.md
    - End-User Documentation:     
        - Information: ./enduser/general.md
    - Developer Documentation:        
        - Core Library: ./developer/corelib.md
        - Folder Structure: ./developer/folders.md
        - Site Module: ./developer/mod-site.md
        - Extension Module: ./developer/mod-ext.md
        - Image Module: ./developer/mod-image.md
        - Software Module: ./developer/mod-software.md
        - Libraries: ./developer/vendor.md
    - Included Documentation:     
        - Suitefish-CMS: ./extra-cms/index.html    
        - Bugfish-Framework: ./extra-framework/index.html     
        - AdminBSB-Theme: ./extra-adminbsb/index.html    
    - Support: support.md
    - License: license.md
    - Impressum: https://bugfishtm.blogspot.com/2023/05/impressum.html
    - Privacy: https://bugfishtm.blogspot.com/2023/05/privacy.html
    - More by Bugfish: https://bugfishtm.github.io

theme:
  name: material
  logo: ./logo.png
  favicon: ./favicon.ico
  primary: deep orange
  language: 'en'
  accent: deep orange
  font: false
  features:
    - content.code.copy
  palette:
    - scheme: default
      primary: deep orange
      accent: deep orange

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
    - mkdocstrings
    - search
    - mkdocs-video
    - glightbox
    
markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  
use_directory_urls: false

extra:
  meta:
    author: "Jan-Maurice Dahlmanns"
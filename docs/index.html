<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <meta http-equiv="refresh" content="5;url=https://bugfishtm.github.io/suitefish-docs/index.html" />
  <title>Suitefish CMS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #E85D1A;
      --orange-dark: #B8400E;
      --orange-glow: #FF7A35;
      --bg:          #0f0f0f;
      --surface:     #1a1a1a;
      --border:      #2e2e2e;
      --text:        #f0f0f0;
      --muted:       #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,93,26,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,93,26,.06) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 20s linear infinite;
      z-index: 0;
    }
    @keyframes grid-drift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* radial glow behind card */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,93,26,.18) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 56px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(232,93,26,.15),
        0 8px 40px rgba(0,0,0,.6),
        0 0 80px rgba(232,93,26,.08);
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 110px; height: 110px;
      background: radial-gradient(circle, rgba(232,93,26,.2) 0%, transparent 70%);
      border-radius: 50%;
      margin-bottom: 28px;
    }
    .logo-wrap img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(232,93,26,.5));
      animation: float 3.6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: .5px;
      color: #fff;
      margin-bottom: 6px;
    }
    h1 span {
      color: var(--orange);
    }

    .tagline {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .divider {
      width: 48px; height: 3px;
      background: linear-gradient(90deg, var(--orange-dark), var(--orange-glow));
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .redirect-msg {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .redirect-msg strong {
      color: var(--text);
    }

    /* countdown ring */
    .ring-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }
    .ring {
      position: relative;
      width: 72px; height: 72px;
    }
    .ring svg {
      transform: rotate(-90deg);
    }
    .ring circle {
      fill: none;
      stroke-width: 5;
    }
    .ring .track  { stroke: var(--border); }
    .ring .fill   {
      stroke: var(--orange);
      stroke-dasharray: 188;
      stroke-dashoffset: 0;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 4px var(--orange));
    }
    .ring .count {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--orange);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--orange-dark), var(--orange));
      color: #fff;
      text-decoration: none;
      font-size: .95rem;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 10px;
      transition: opacity .2s, transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(232,93,26,.35);
    }
    .btn:hover {
      opacity: .9;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(232,93,26,.5);
    }
    .btn svg { flex-shrink: 0; }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 32px;
      font-size: .75rem;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-wrap">
      <img src="logo.png" alt="Suitefish Logo" />
    </div>

    <h1>Suite<span>fish</span> CMS</h1>
    <p class="tagline">You are being redirected to the official documentation.</p>
    <div class="divider"></div>

    <p class="redirect-msg">Redirecting in <strong id="sec">5</strong> seconds&hellip;</p>

    <div class="ring-wrap">
      <div class="ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="track" cx="36" cy="36" r="30"/>
          <circle class="fill"  cx="36" cy="36" r="30" id="arc"/>
        </svg>
        <div class="count" id="count">5</div>
      </div>
    </div>

    <a class="btn" href="https://bugfishtm.github.io/suitefish-docs/index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Redirect Now
    </a>
  </div>

  <p class="footer">&copy; 2026 Suitefish CMS &mdash; bugfishtm</p>

  <script>
    const TARGET = 'https://bugfishtm.github.io/suitefish-docs/index.html';
    const TOTAL  = 5;
    const CIRC   = 2 * Math.PI * 30; // ≈ 188.5

    const arc   = document.getElementById('arc');
    const count = document.getElementById('count');
    const sec   = document.getElementById('sec');

    arc.style.strokeDasharray  = CIRC;
    arc.style.strokeDashoffset = 0;

    let remaining = TOTAL;

    function tick() {
      remaining--;
      count.textContent = remaining;
      sec.textContent   = remaining;
      arc.style.strokeDashoffset = CIRC * (1 - remaining / TOTAL);

      if (remaining <= 0) {
        window.location.href = TARGET;
      } else {
        setTimeout(tick, 1000);
      }
    }

    setTimeout(tick, 1000);
  </script>

</body>
</html>
